<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Size Editor — Fill The Truck</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: rgba(0,0,0,0.4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { font-size: 22px; }
        .header-actions { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #ff6b35; color: white; }
        .btn-primary:hover { background: #e55a2b; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }

        .main-layout {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Left: Items Grid */
        .items-panel {
            flex: 1;
            min-width: 0;
        }

        .items-panel h2 {
            font-size: 16px;
            color: #ff6b35;
            margin-bottom: 15px;
        }

        .category-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin: 20px 0 10px;
            padding-left: 5px;
        }
        .category-label:first-child { margin-top: 0; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .item-card {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 14px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .item-card:hover {
            background: rgba(255,255,255,0.1);
        }

        .item-card.modified {
            border-color: #ff6b35;
            background: rgba(255,107,53,0.1);
        }

        .item-top {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .item-sprite-box {
            width: 70px;
            height: 70px;
            background: #f0f0f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .item-sprite-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-meta {
            flex: 1;
            min-width: 0;
        }

        .item-meta h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-dims {
            font-size: 12px;
            color: #aaa;
        }

        .item-dims .changed {
            color: #ff6b35;
            font-weight: bold;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .slider-row label {
            font-size: 11px;
            color: #999;
            width: 14px;
            text-align: right;
        }

        .slider-row input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }

        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff6b35;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-val {
            font-size: 11px;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 3px;
            min-width: 30px;
            text-align: center;
        }

        /* Right: Scale Reference */
        .reference-panel {
            width: 440px;
            flex-shrink: 0;
            position: sticky;
            top: 80px;
            align-self: flex-start;
        }

        .reference-panel h2 {
            font-size: 16px;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .truck-ref {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .truck-ref canvas {
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }

        .ref-label {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 8px;
        }

        .scale-strip {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 15px;
            overflow-x: auto;
        }

        .scale-strip canvas {
            display: block;
            border-radius: 6px;
        }

        /* Export panel */
        .export-panel {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .code-output {
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #4CAF50;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        .modified-count {
            background: #ff6b35;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Furniture Size Editor <span class="modified-count" id="modCount" style="display:none">0 modified</span></h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
            <button class="btn btn-success" onclick="exportCode()">Copy Code</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="items-panel">
            <h2>All Items — Drag sliders to resize</h2>
            <div id="itemsContainer"></div>
        </div>

        <div class="reference-panel">
            <h2>Scale Reference</h2>
            <div class="truck-ref">
                <canvas id="truckCanvas" width="400" height="300"></canvas>
                <div class="ref-label">Truck interior: 340px wide × 520px tall</div>
            </div>
            <div class="scale-strip">
                <canvas id="stripCanvas" width="400" height="500"></canvas>
                <div class="ref-label">All items at 1:1 game scale (scroll down)</div>
            </div>
            <div class="export-panel">
                <button class="btn btn-success" onclick="exportCode()" style="width:100%">Copy FURNITURE_ITEMS Code</button>
                <div class="code-output" id="codeOutput">// Adjust sizes, then click "Copy Code"</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== CURRENT GAME DATA ====================
        const FURNITURE_ITEMS = [
            { type: 'rect', width: 105, height: 155, name: 'Fridge', density: 0.003, sprite: 'fridge', category: 'Heavy Appliances' },
            { type: 'rect', width: 80, height: 97, name: 'Washer', density: 0.003, sprite: 'washer', category: 'Heavy Appliances' },
            { type: 'rect', width: 80, height: 83, name: 'Dryer', density: 0.003, sprite: 'dryer', category: 'Heavy Appliances' },
            { type: 'rect', width: 70, height: 45, name: 'Microwave', density: 0.0015, sprite: 'microwave', category: 'Heavy Appliances' },
            { type: 'rect', width: 90, height: 120, name: 'Upright Piano', density: 0.003, sprite: 'piano', category: 'Large Furniture' },
            { type: 'rect', width: 140, height: 78, name: 'Long Dresser', density: 0.002, sprite: 'long_dresser', category: 'Large Furniture' },
            { type: 'rect', width: 65, height: 95, name: 'Chest of Drawers', density: 0.002, sprite: 'chest_of_drawers', category: 'Large Furniture' },
            { type: 'rect', width: 45, height: 125, name: 'Grandfather Clock', density: 0.0025, sprite: 'grandfather_clock', category: 'Large Furniture' },
            { type: 'rect', width: 130, height: 71, name: 'Dining Table', density: 0.002, sprite: 'dining_table', category: 'Large Furniture' },
            { type: 'rect', width: 85, height: 60, name: 'Coffee Table', density: 0.0015, sprite: 'coffee_table', category: 'Large Furniture' },
            { type: 'rect', width: 60, height: 57, name: 'Nightstand', density: 0.0015, sprite: 'nightstand', category: 'Medium Furniture' },
            { type: 'rect', width: 38, height: 65, name: 'Bar Stool', density: 0.0008, sprite: 'bar_stool', category: 'Medium Furniture' },
            { type: 'rect', width: 50, height: 85, name: 'Mirror', density: 0.001, sprite: 'mirror', category: 'Medium Furniture' },
            { type: 'rect', width: 70, height: 50, name: 'TV', density: 0.001, sprite: 'tv', category: 'Medium Furniture' },
            { type: 'rect', width: 40, height: 125, name: 'Floor Lamp', density: 0.0008, sprite: 'floor_lamp', category: 'Medium Furniture' },
            { type: 'rect', width: 90, height: 77, name: 'BBQ Pit', density: 0.0015, sprite: 'bbq', category: 'Outdoor / Bulky' },
            { type: 'rect', width: 100, height: 60, name: 'Bicycle', density: 0.001, sprite: 'bicycle', category: 'Outdoor / Bulky' },
            { type: 'rect', width: 60, height: 63, name: 'Lawnmower', density: 0.0015, sprite: 'lawnmower', category: 'Outdoor / Bulky' },
            { type: 'rect', width: 75, height: 56, name: 'Wagon', density: 0.001, sprite: 'wagon', category: 'Outdoor / Bulky' },
            { type: 'rect', width: 45, height: 60, name: 'Plant', density: 0.001, sprite: 'plant', category: 'Small Items' },
            { type: 'rect', width: 45, height: 70, name: 'Trash Can', density: 0.001, sprite: 'trashcan', category: 'Small Items' },
            { type: 'rect', width: 38, height: 63, name: 'Vacuum', density: 0.001, sprite: 'vacuum', category: 'Small Items' },
            { type: 'rect', width: 38, height: 63, name: 'Guitar', density: 0.0008, sprite: 'guitar', category: 'Small Items' },
            { type: 'rect', width: 65, height: 46, name: 'Large Carton', density: 0.001, sprite: 'large_carton', category: 'Boxes' },
            { type: 'rect', width: 50, height: 35, name: 'Medium Carton', density: 0.001, sprite: 'medium_carton', category: 'Boxes' },
            { type: 'rect', width: 45, height: 37, name: 'Small Carton', density: 0.0008, sprite: 'small_carton', category: 'Boxes' },
            { type: 'rect', width: 55, height: 36, name: 'Book Box', density: 0.0015, sprite: 'book_box', category: 'Boxes' },
            { type: 'rect', width: 65, height: 38, name: 'Toolbox', density: 0.001, sprite: 'toolbox', category: 'Boxes' },
            { type: 'rect', width: 65, height: 46, name: 'Storage Tote', density: 0.001, sprite: 'tote', category: 'Boxes' },
        ];

        const SPRITE_PATHS = {
            fridge: 'fill_the_truck_assets_individual/sprites/Fridge.png',
            washer: 'fill_the_truck_assets_individual/sprites/Washer.png',
            dryer: 'fill_the_truck_assets_individual/sprites/Dryer.png',
            microwave: 'fill_the_truck_assets_individual/sprites/Microwave.png',
            piano: 'fill_the_truck_assets_individual/sprites/Upright Piano.png',
            long_dresser: 'fill_the_truck_assets_individual/sprites/Long Dresser.png',
            chest_of_drawers: 'fill_the_truck_assets_individual/sprites/Chest of Drawers.png',
            grandfather_clock: 'fill_the_truck_assets_individual/sprites/Grandfather Clock.png',
            dining_table: 'fill_the_truck_assets_individual/sprites/rectangle dining table.png',
            coffee_table: 'fill_the_truck_assets_individual/sprites/Round Coffee Table.png',
            nightstand: 'fill_the_truck_assets_individual/sprites/NightStand.png',
            bar_stool: 'fill_the_truck_assets_individual/sprites/Bar Stool.png',
            mirror: 'fill_the_truck_assets_individual/sprites/Mirror.png',
            tv: 'fill_the_truck_assets_individual/sprites/TV.png',
            floor_lamp: 'fill_the_truck_assets_individual/sprites/Floor Lamp.png',
            bbq: 'fill_the_truck_assets_individual/sprites/BBQ Pit.png',
            bicycle: 'fill_the_truck_assets_individual/sprites/Bicycle.png',
            lawnmower: 'fill_the_truck_assets_individual/sprites/Lawnmower.png',
            wagon: 'fill_the_truck_assets_individual/sprites/Wagon.png',
            plant: 'fill_the_truck_assets_individual/sprites/Plant.png',
            trashcan: 'fill_the_truck_assets_individual/sprites/TrashCan.png',
            vacuum: 'fill_the_truck_assets_individual/sprites/Vacuum.png',
            guitar: 'fill_the_truck_assets_individual/sprites/Acoustic Guitar.png',
            large_carton: 'fill_the_truck_assets_individual/sprites/Large Carton.png',
            medium_carton: 'fill_the_truck_assets_individual/sprites/Medium Carton.png',
            small_carton: 'fill_the_truck_assets_individual/sprites/Small Carton.png',
            book_box: 'fill_the_truck_assets_individual/sprites/Book Box.png',
            toolbox: 'fill_the_truck_assets_individual/sprites/Small Red Toolbox.png',
            tote: 'fill_the_truck_assets_individual/sprites/Tote_Plastic_Yellow-top.png',
        };

        // ==================== STATE ====================
        let items = JSON.parse(JSON.stringify(FURNITURE_ITEMS));
        const originals = JSON.parse(JSON.stringify(FURNITURE_ITEMS));
        const spriteImages = {};
        let spritesReady = false;

        // ==================== SPRITE LOADING ====================
        function loadSprites() {
            let loaded = 0;
            const total = Object.keys(SPRITE_PATHS).length;

            for (const [key, path] of Object.entries(SPRITE_PATHS)) {
                const img = new Image();
                img.onload = () => {
                    spriteImages[key] = img;
                    loaded++;
                    if (loaded >= total) {
                        spritesReady = true;
                        renderAll();
                    }
                };
                img.onerror = () => {
                    loaded++;
                    if (loaded >= total) {
                        spritesReady = true;
                        renderAll();
                    }
                };
                img.src = path;
            }
        }

        // ==================== RENDER ITEM CARDS ====================
        function renderItemCards() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            let currentCategory = '';

            items.forEach((item, i) => {
                if (item.category !== currentCategory) {
                    currentCategory = item.category;
                    const label = document.createElement('div');
                    label.className = 'category-label';
                    label.textContent = currentCategory;
                    container.appendChild(label);

                    const grid = document.createElement('div');
                    grid.className = 'items-grid';
                    grid.id = `grid-${currentCategory.replace(/\s+/g, '')}`;
                    container.appendChild(grid);
                }

                const grid = container.querySelector(`#grid-${currentCategory.replace(/[\s/]+/g, '')}`);
                if (!grid) return;

                const orig = originals[i];
                const isModified = item.width !== orig.width || item.height !== orig.height;

                const card = document.createElement('div');
                card.className = `item-card ${isModified ? 'modified' : ''}`;
                card.id = `card-${i}`;

                const dimText = isModified
                    ? `<span class="changed">${item.width}×${item.height}</span> (was ${orig.width}×${orig.height})`
                    : `${item.width}×${item.height}`;

                card.innerHTML = `
                    <div class="item-top">
                        <div class="item-sprite-box" id="sprite-${i}"></div>
                        <div class="item-meta">
                            <h3>${item.name}</h3>
                            <div class="item-dims">${dimText}</div>
                        </div>
                    </div>
                    <div class="slider-row">
                        <label>W</label>
                        <input type="range" min="15" max="200" value="${item.width}" step="1"
                               oninput="updateItem(${i}, 'width', this.value)">
                        <span class="slider-val" id="wval-${i}">${item.width}</span>
                    </div>
                    <div class="slider-row">
                        <label>H</label>
                        <input type="range" min="15" max="200" value="${item.height}" step="1"
                               oninput="updateItem(${i}, 'height', this.value)">
                        <span class="slider-val" id="hval-${i}">${item.height}</span>
                    </div>
                `;

                grid.appendChild(card);

                // Draw sprite in the preview box
                const spriteBox = card.querySelector(`#sprite-${i}`);
                if (item.sprite && spriteImages[item.sprite]) {
                    const img = document.createElement('img');
                    img.src = SPRITE_PATHS[item.sprite];
                    spriteBox.appendChild(img);
                } else {
                    spriteBox.style.background = '#ccc';
                    spriteBox.textContent = '?';
                    spriteBox.style.color = '#888';
                    spriteBox.style.fontSize = '20px';
                }
            });
        }

        function updateItem(index, prop, value) {
            value = parseInt(value);
            items[index][prop] = value;

            // Update value display
            const valId = prop === 'width' ? `wval-${index}` : `hval-${index}`;
            document.getElementById(valId).textContent = value;

            // Update dims text
            const orig = originals[index];
            const isModified = items[index].width !== orig.width || items[index].height !== orig.height;
            const card = document.getElementById(`card-${index}`);
            const dimsEl = card.querySelector('.item-dims');
            dimsEl.innerHTML = isModified
                ? `<span class="changed">${items[index].width}×${items[index].height}</span> (was ${orig.width}×${orig.height})`
                : `${items[index].width}×${items[index].height}`;

            card.classList.toggle('modified', isModified);
            updateModCount();
            drawScaleStrip();
            drawTruckPreview();
        }

        function updateModCount() {
            const count = items.filter((item, i) => item.width !== originals[i].width || item.height !== originals[i].height).length;
            const el = document.getElementById('modCount');
            if (count > 0) {
                el.style.display = 'inline';
                el.textContent = `${count} modified`;
            } else {
                el.style.display = 'none';
            }
        }

        // ==================== SCALE STRIP ====================
        function drawScaleStrip() {
            const canvas = document.getElementById('stripCanvas');
            const ctx = canvas.getContext('2d');

            // Calculate required height
            const padding = 8;
            const rowGap = 6;
            const labelHeight = 16;
            let x = padding;
            let y = padding;
            let rowHeight = 0;
            const maxWidth = 400 - padding * 2;

            // First pass: compute layout
            const positions = [];
            items.forEach((item, i) => {
                if (x + item.width > maxWidth + padding && x > padding) {
                    y += rowHeight + rowGap + labelHeight;
                    x = padding;
                    rowHeight = 0;
                }
                positions.push({ x, y: y + labelHeight, w: item.width, h: item.height, i });
                rowHeight = Math.max(rowHeight, item.height);
                x += item.width + rowGap;
            });

            const totalHeight = y + rowHeight + labelHeight + padding;
            canvas.height = Math.max(totalHeight, 200);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw truck width reference
            ctx.strokeStyle = '#B22234';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(padding, 2);
            ctx.lineTo(padding + 340, 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#B22234';
            ctx.font = '9px sans-serif';
            ctx.fillText('← 340px truck interior width →', padding + 80, 10);

            // Draw items
            positions.forEach(({ x, y, w, h, i }) => {
                const item = items[i];

                // Draw sprite or fallback rect
                if (item.sprite && spriteImages[item.sprite]) {
                    ctx.drawImage(spriteImages[item.sprite], x, y, w, h);
                } else {
                    ctx.fillStyle = '#ddd';
                    ctx.fillRect(x, y, w, h);
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, w, h);
                }

                // Label
                ctx.fillStyle = '#333';
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${item.name} ${w}×${h}`, x, y - 2);
            });
        }

        // ==================== TRUCK PREVIEW ====================
        function drawTruckPreview() {
            const canvas = document.getElementById('truckCanvas');
            const ctx = canvas.getContext('2d');

            const scale = 0.45; // Scale down truck to fit
            const tw = 400 * scale;
            const th = 600 * scale;
            const offsetX = (canvas.width - tw) / 2;
            const offsetY = 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#2a2a3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw truck outline
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // Interior
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(30, 0, 340, 520);

            // Floor
            ctx.fillStyle = '#C9A76A';
            ctx.fillRect(0, 520, 400, 20);

            // Walls
            ctx.fillStyle = '#B22234';
            ctx.fillRect(0, 0, 30, 540);
            ctx.fillRect(370, 0, 30, 540);

            // Draw a few reference items in the truck
            const refItems = [0, 1, 4, 11, 22]; // Fridge, Washer, Piano, Bar Stool, Guitar
            let ry = 520;
            refItems.forEach(idx => {
                const item = items[idx];
                if (!item) return;
                ry -= item.height;
                const rx = 30 + (340 - item.width) / 2;

                if (item.sprite && spriteImages[item.sprite]) {
                    ctx.globalAlpha = 0.7;
                    ctx.drawImage(spriteImages[item.sprite], rx, ry, item.width, item.height);
                    ctx.globalAlpha = 1.0;
                } else {
                    ctx.fillStyle = 'rgba(150,150,150,0.5)';
                    ctx.fillRect(rx, ry, item.width, item.height);
                }

                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(rx, ry, item.width, item.height);

                ctx.fillStyle = '#333';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(item.name, rx + item.width / 2, ry + item.height / 2 + 4);

                ry -= 4; // gap
            });

            ctx.restore();
        }

        // ==================== EXPORT ====================
        function exportCode() {
            // Build the code with proper formatting matching game.js style
            const categories = {
                'Heavy Appliances': '    // Heavy appliances',
                'Large Furniture': '    // Large furniture',
                'Medium Furniture': '    // Medium furniture',
                'Outdoor / Bulky': '    // Outdoor / bulky',
                'Small Items': '    // Small items',
                'Boxes': '    // Boxes & small items',
            };

            let lines = ['const FURNITURE_ITEMS = ['];
            let currentCat = '';

            items.forEach((item, i) => {
                if (item.category !== currentCat) {
                    currentCat = item.category;
                    if (categories[currentCat]) {
                        lines.push(categories[currentCat]);
                    }
                }

                const props = [`type: '${item.type}'`, `width: ${item.width}`, `height: ${item.height}`,
                    `name: '${item.name}'`, `density: ${item.density}`, `sprite: '${item.sprite}'`];
                const suffix = i < items.length - 1 ? ',' : '';
                lines.push(`    { ${props.join(', ')} }${suffix}`);
            });

            lines.push('];');

            // Add change summary
            const changes = items.filter((item, i) =>
                item.width !== originals[i].width || item.height !== originals[i].height
            ).map((item, _, arr) => {
                const i = items.indexOf(item);
                const orig = originals[i];
                return `// ${item.name}: ${orig.width}×${orig.height} → ${item.width}×${item.height}`;
            });

            if (changes.length > 0) {
                lines.push('');
                lines.push('// ===== CHANGES =====');
                lines.push(...changes);
            }

            const code = lines.join('\n');
            document.getElementById('codeOutput').textContent = code;

            navigator.clipboard.writeText(code).then(() => {
                showToast('Code copied to clipboard!');
            }).catch(() => {
                showToast('Code generated below — copy manually');
            });
        }

        function resetAll() {
            if (!confirm('Reset all items to starting dimensions?')) return;
            items = JSON.parse(JSON.stringify(originals));
            renderAll();
            showToast('All items reset');
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        // ==================== INIT ====================
        function renderAll() {
            renderItemCards();
            drawScaleStrip();
            drawTruckPreview();
            updateModCount();
        }

        loadSprites();
        // Also render immediately with placeholders
        renderAll();
    </script>
</body>
</html>
